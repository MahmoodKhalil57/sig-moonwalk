<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Suluk">
  <defs>
    <linearGradient id="cTile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1a1746"/>
    </linearGradient>
    <linearGradient id="cMoon" x1="120" y1="120" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f5c451"/>
    </linearGradient>
    <mask id="cCrescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="232" cy="232" r="150" fill="white"/>
      <circle cx="296" cy="196" r="132" fill="black"/>
    </mask>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#cTile)"/>
  <rect width="512" height="512" fill="url(#cMoon)" mask="url(#cCrescent)"/>
  <!-- the walk: ascending waypoints of the path -->
  <g fill="#a5b4fc">
    <circle cx="196" cy="392" r="15"/>
    <circle cx="252" cy="372" r="16"/>
    <circle cx="308" cy="344" r="17"/>
    <circle cx="360" cy="308" r="18" fill="#5eead4"/>
  </g>
</svg>
