<svg width="760" height="232" viewBox="0 0 760 232" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Suluk">
  <title>Suluk wordmark</title>
  <defs>
    <linearGradient id="wm-tile" x1="0" y1="0" x2="0" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1e3a"/>
      <stop offset="1" stop-color="#0c0e1f"/>
    </linearGradient>
    <linearGradient id="wm-stroke" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="wm-text" x1="300" y1="44" x2="680" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="0.6" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- icon tile (suluk-icon scaled 0.4375 -> 224px) -->
  <g transform="translate(8,4) scale(0.4375)">
    <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#wm-tile)"/>
    <path d="M 318.3 136.4 A 76 76 0 1 0 256 256 A 76 76 0 1 1 193.7 375.6"
          fill="none" stroke="url(#wm-stroke)" stroke-width="64" stroke-linecap="round"/>
    <circle cx="318.3" cy="136.4" r="20" fill="#5eead4"/>
  </g>

  <!-- "suluk" wordmark: monoline lowercase, paths only -->
  <g fill="none" stroke="url(#wm-text)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- s -->
    <path d="M 355.9 93.3 A 26 26 0 1 0 336 136 A 26 26 0 1 1 316.1 178.7"/>
    <!-- u -->
    <path d="M 392 84 L 392 158 A 30 30 0 0 0 452 158 L 452 84"/>
    <!-- l -->
    <path d="M 486 44 L 486 188"/>
    <!-- u -->
    <path d="M 516 84 L 516 158 A 30 30 0 0 0 576 158 L 576 84"/>
    <!-- k -->
    <path d="M 610 44 L 610 188"/>
    <path d="M 652 110 L 612 150 L 656 188"/>
  </g>
  <!-- waypoint accent dotting the first 'u' -->
  <circle cx="392" cy="64" r="11" fill="#5eead4"/>
</svg>
