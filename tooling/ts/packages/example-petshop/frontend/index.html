<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Petshop — Suluk generated UI</title>
    <style>
      :root { color-scheme: dark; }
      body { font: 14px/1.5 ui-monospace, monospace; margin: 0; background: #0b0e14; color: #cdd6f4; }
      header { padding: 14px 20px; border-bottom: 1px solid #1e2433; }
      header b { color: #f5a97f; letter-spacing: .05em; } a { color: #8aadf4; }
      main { padding: 20px; max-width: 820px; margin: 0 auto; }
      section { border: 1px solid #1e2433; border-radius: 10px; padding: 4px 18px 18px; margin: 16px 0; }
      h2, h3 { color: #f5a97f; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; }
      .row { display: flex; gap: 12px; align-items: baseline; }
      .suluk-btn { background: #f5a97f; color: #11141c; border: 0; border-radius: 6px; padding: 4px 12px; cursor: pointer; font: inherit; }
      .suluk-input { background: #11141c; color: #cdd6f4; border: 1px solid #2a3146; border-radius: 6px; padding: 5px 8px; width: 100%; }
      .suluk-field { margin: 10px 0; } .suluk-label { display: block; font-size: 12px; color: #9399b2; margin-bottom: 3px; }
      .suluk-table { width: 100%; border-collapse: collapse; } .suluk-th, .suluk-td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #1e2433; }
      .suluk-th { color: #9399b2; font-weight: 600; } form.space-y-6 > * { margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
